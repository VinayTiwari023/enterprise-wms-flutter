name: enterprise_wms
description: "Enterprise Warehouse Management System built with Flutter using Feature-First MVVM architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Dependency Injection
  get_it: ^8.0.0

  # Networking
  http: ^1.6.0
  dio: ^5.5.0

  # Navigation
  go_router: ^14.3.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Logging
  logger: ^2.4.0

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.5
  uuid: ^4.4.2

  # Charts
  fl_chart: ^1.2.0

  # Serialization
  json_annotation: ^4.9.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Generation
  build_runner: ^2.4.8
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.4
  mockito: ^5.4.4

flutter:
  generate: true
  uses-material-design: true
